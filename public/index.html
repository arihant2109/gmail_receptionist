<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Receptionist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Receptionist</h1>
      <p class="subtitle">Say your issue, booking inquiry, or booking. Replies by voice; issues and bookings are sent by email.</p>
    </header>

    <main>
      <div class="controls">
        <button type="button" id="btnToggle" aria-label="Start or stop listening">Start listening</button>
      </div>

      <div class="status" id="status" aria-live="polite">Stopped. Click "Start listening" and allow microphone when prompted.</div>

      <div class="log" id="log" aria-live="polite">
        <div class="log-label">Activity</div>
        <ul id="logList"></ul>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
